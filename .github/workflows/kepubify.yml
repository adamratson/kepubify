name: kepubify

on: [push, pull_request]

jobs:
  test:
    name: test - Go ${{matrix.go}}
    runs-on: ubuntu-latest

    container:
      image: golang:${{matrix.go}}-alpine

    strategy:
      matrix:
        go:
          - "1.24"
          - "1.25"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tools
        run: apk update && apk add --no-cache wine freetype libpng gcc libc-dev

      - name: Build
        run: go build -v ./...

      - name: Test (kepub)
        run: go test -v -cover ./kepub

      - name: Test (kepubify)
        run: go test -v -cover ./cmd/kepubify

      - name: Test - Wine (kepub)
        env:
          WINEPREFIX: /tmp/wine
          WINEDEBUG: -all
          GOOS: windows
        run: go test -v -cover -exec wine64 ./kepub

      - name: Test - Wine (kepubify)
        env:
          WINEPREFIX: /tmp/wine
          WINEDEBUG: -all
          GOOS: windows
        run: go test -v -cover -exec wine64 ./cmd/kepubify

      - name: Benchmark (kepub)
        run: go test -bench=. -benchmem ./kepub

      - name: Run (kepubify)
        run: go run ./cmd/kepubify --help

      - name: Run (covergen)
        run: go run ./cmd/covergen --help

      - name: Run (seriesmeta)
        run: go run ./cmd/seriesmeta --help

  build-release:
    name: build
    runs-on: ubuntu-latest

    needs:
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == "refs/tags/"* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: |
          echo "kepubify ${{steps.version.outputs.version}}"
          mkdir build

      - {name: Build - kepubify-linux-64bit,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/kepubify-linux-64bit ./cmd/kepubify"}, env: {CGO_ENABLED: 0, GOOS: linux, GOARCH: amd64}}
      - {name: Build - kepubify-linux-32bit,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/kepubify-linux-32bit ./cmd/kepubify"}, env: {CGO_ENABLED: 0, GOOS: linux, GOARCH: 386}}
      - {name: Build - kepubify-linux-arm,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/kepubify-linux-arm ./cmd/kepubify"}, env: {CGO_ENABLED: 0, GOOS: linux, GOARCH: arm, GOARM: 7}}
      - {name: Build - kepubify-linux-armv6,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/kepubify-linux-armv6 ./cmd/kepubify"}, env: {CGO_ENABLED: 0, GOOS: linux, GOARCH: arm, GOARM: 6}}
      - {name: Build - kepubify-linux-arm64,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/kepubify-linux-arm64 ./cmd/kepubify"}, env: {CGO_ENABLED: 0, GOOS: linux, GOARCH: arm64}}
      - {name: Build - kepubify-darwin-64bit,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/kepubify-darwin-64bit ./cmd/kepubify"}, env: {CGO_ENABLED: 0, GOOS: darwin, GOARCH: amd64}}
      - {name: Build - kepubify-darwin-arm64,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/kepubify-darwin-arm64 ./cmd/kepubify"}, env: {CGO_ENABLED: 0, GOOS: darwin, GOARCH: arm64}}
      - {name: Build - kepubify-windows-64bit.exe,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/kepubify-windows-64bit.exe ./cmd/kepubify"}, env: {CGO_ENABLED: 0, GOOS: windows, GOARCH: amd64}}
      - {name: Build - kepubify-windows-32bit.exe,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/kepubify-windows-32bit.exe ./cmd/kepubify"}, env: {CGO_ENABLED: 0, GOOS: windows, GOARCH: 386}}
      - {name: Build - kepubify-windows-arm64.exe,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/kepubify-windows-arm64.exe ./cmd/kepubify"}, env: {CGO_ENABLED: 0, GOOS: windows, GOARCH: arm64}}

      - {name: Build - covergen-linux-64bit,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/covergen-linux-64bit ./cmd/covergen"}, env: {CGO_ENABLED: 0, GOOS: linux, GOARCH: amd64}}
      - {name: Build - covergen-linux-32bit,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/covergen-linux-32bit ./cmd/covergen"}, env: {CGO_ENABLED: 0, GOOS: linux, GOARCH: 386}}
      - {name: Build - covergen-linux-arm,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/covergen-linux-arm ./cmd/covergen"}, env: {CGO_ENABLED: 0, GOOS: linux, GOARCH: arm, GOARM: 7}}
      - {name: Build - covergen-linux-armv6,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/covergen-linux-armv6 ./cmd/covergen"}, env: {CGO_ENABLED: 0, GOOS: linux, GOARCH: arm, GOARM: 6}}
      - {name: Build - covergen-linux-arm64,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/covergen-linux-arm64 ./cmd/covergen"}, env: {CGO_ENABLED: 0, GOOS: linux, GOARCH: arm64}}
      - {name: Build - covergen-darwin-64bit,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/covergen-darwin-64bit ./cmd/covergen"}, env: {CGO_ENABLED: 0, GOOS: darwin, GOARCH: amd64}}
      - {name: Build - covergen-darwin-arm64,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/covergen-darwin-arm64 ./cmd/covergen"}, env: {CGO_ENABLED: 0, GOOS: darwin, GOARCH: arm64}}
      - {name: Build - covergen-windows-64bit.exe,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/covergen-windows-64bit.exe ./cmd/covergen"}, env: {CGO_ENABLED: 0, GOOS: windows, GOARCH: amd64}}
      - {name: Build - covergen-windows-32bit.exe,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/covergen-windows-32bit.exe ./cmd/covergen"}, env: {CGO_ENABLED: 0, GOOS: windows, GOARCH: 386}}
      - {name: Build - covergen-windows-arm64.exe,
         uses: "docker://golang:1.25-alpine", with: {entrypoint: go, args: "build -v -ldflags \"-s -w -X main.version=${{steps.version.outputs.version}}\" -trimpath -o ./build/covergen-windows-arm64.exe ./cmd/covergen"}, env: {CGO_ENABLED: 0, GOOS: windows, GOARCH: arm64}}

      - {name: Build - seriesmeta-linux-64bit,
         uses: "docker://docker.elastic.co/beats-dev/golang-crossbuild:1.25.11-main", with: {entrypoint: /crossbuild,
         args: "--platforms linux/amd64 --build-cmd \"CGO_ENABLED=1 go build -v -ldflags '-s -w -X main.version=${{steps.version.outputs.version}}' -trimpath -o ./build/seriesmeta-linux-64bit ./cmd/seriesmeta\""}}
      - {name: Build - seriesmeta-linux-arm,
         uses: "docker://docker.elastic.co/beats-dev/golang-crossbuild:1.25.11-armhf", with: {entrypoint: /crossbuild,
         args: "--platforms linux/armv7 --build-cmd \"CGO_ENABLED=1 go build -v -ldflags '-s -w -X main.version=${{steps.version.outputs.version}}' -trimpath -o ./build/seriesmeta-linux-arm ./cmd/seriesmeta\""}}
      - {name: Build - seriesmeta-linux-arm64,
         uses: "docker://docker.elastic.co/beats-dev/golang-crossbuild:1.25.11-arm", with: {entrypoint: /crossbuild,
         args: "--platforms linux/arm64 --build-cmd \"CGO_ENABLED=1 go build -v -ldflags '-s -w -X main.version=${{steps.version.outputs.version}}' -trimpath -o ./build/seriesmeta-linux-arm64 ./cmd/seriesmeta\""}}
      - {name: Build - seriesmeta-darwin-64bit,
         uses: "docker://docker.elastic.co/beats-dev/golang-crossbuild:1.25.11-darwin", with: {entrypoint: /crossbuild,
         args: "--platforms darwin/amd64 --build-cmd \"CGO_ENABLED=1 go build -v -ldflags '-s -w -X main.version=${{steps.version.outputs.version}}' -trimpath -o ./build/seriesmeta-darwin-64bit ./cmd/seriesmeta\""}}
      - {name: Build - seriesmeta-windows-64bit.exe,
         uses: "docker://docker.elastic.co/beats-dev/golang-crossbuild:1.25.11-main", with: {entrypoint: /crossbuild,
         args: "--platforms windows/amd64 --build-cmd \"CGO_ENABLED=1 go build -v -ldflags '-s -w -X main.version=${{steps.version.outputs.version}}' -trimpath -o ./build/seriesmeta-windows-64bit.exe ./cmd/seriesmeta\""}}

      - name: List
        run: |
          cd build
          ls -lah
          file *

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Build
          path: build

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create --draft --title $VER $VER build/*
        env:
          GH_TOKEN: ${{secrets.GH_TOKEN}}
          VER: ${{steps.version.outputs.version}}
